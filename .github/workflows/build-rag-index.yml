name: Build RAG Index

# Runnable from a tag: push a tag like rag-index-v1, or run manually from a tag
# and optionally provide the version input.
on:
  push:
    branches:
      - main
    tags:
      - "rag-index-v*"
    paths:
      - "ci/corpus/**"
  workflow_dispatch:
    inputs:
      version:
        description: "RAG index version. Defaults to the rag-index-v* tag suffix, then 1."
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-rag-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ci -> target
          key: rag-index-ci-${{ hashFiles('ci/Cargo.toml', 'ci/**/*.rs') }}

      - name: Build index builder
        run: cargo build --release --manifest-path ci/Cargo.toml --bin build_rag_index

      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/fastembed
          key: fastembed-bgem3-${{ runner.os }}

      - name: Build RAG index
        # The first run downloads fastembed's BGEM3Q model, about 570 MB, so this
        # step can take several minutes before embedding starts.
        run: ./ci/target/release/build_rag_index --corpus ci/corpus --cache "$RUNNER_TEMP/fastembed" --out rag-index.bin

      - name: Generate release manifest
        id: manifest
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          version="${DISPATCH_VERSION:-}"
          if [[ -z "$version" && "$REF_NAME" == rag-index-v* ]]; then
            version="${REF_NAME#rag-index-v}"
          fi
          if [[ -z "$version" ]]; then
            version="1"
          fi

          tag="rag-index-v$version"
          sha256="$(awk '{print $1; exit}' rag-index.bin.sha256)"
          jq -n \
            --arg url "https://github.com/${{ github.repository }}/releases/download/$tag/rag-index.bin" \
            --arg sha256 "$sha256" \
            --arg version "$version" \
            '{rag_index:{url:$url,sha256:$sha256,version:$version}}' > rag-index.manifest.json

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Publish RAG index release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.manifest.outputs.tag }}
          files: |
            rag-index.bin
            rag-index.bin.sha256
            rag-index.manifest.json
